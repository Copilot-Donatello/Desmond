<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Shopping Cart – Cali Clear</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="components/assets/css/components.css">

  <!-- JS for navbar toggle -->
  <script src="assets/js/main.js"></script>
  <script src="assets/js/toast.js"></script>

  <style>
    /* Cart Styles */
    .cart-container {
      max-width: 1200px;
      margin: 120px auto 50px;
      padding: 0 20px;
    }

    .cart-main {
      max-width: 1000px;
      margin: 120px auto 50px;
      padding: 0 20px;
    }

    h1.cart-title {
      text-align: center;
      font-size: 32px;
      margin-bottom: 30px;
      color: #ff6f61;
    }

    .cart-table {
      width: 100%;
      border-collapse: collapse;
    }

    .cart-table th, .cart-table td {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    .cart-table th {
      background-color: #f9f9f9;
      font-weight: 600;
    }

    .cart-product img {
      width: 80px;
      border-radius: 8px;
      margin-right: 10px;
      vertical-align: middle;
    }

    .quantity-input {
      width: 60px;
      padding: 5px;
      text-align: center;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .remove-btn {
      background-color: #ff4d4d;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .remove-btn:hover {
      background-color: #e63939;
    }

    .cart-summary {
      max-width: 400px;
      margin-left: auto;
      margin-top: 30px;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 10px;
      background: #fff;
    }

    .cart-summary h3 {
      margin-bottom: 20px;
      color: #ff6f61;
    }

    .cart-summary p {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .checkout-btn {
      display: block;
      width: 100%;
      padding: 12px;
      text-align: center;
      background-color: #ff6f61;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
    }

    .checkout-btn:hover {
      background-color: #e65c50;
    }

    @media (max-width: 768px) {
      .cart-table th, .cart-table td {
        font-size: 14px;
        padding: 10px;
      }

      .cart-product img {
        width: 60px;
      }
    }

    /* Cart Items Container */
    #cart-items {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 30px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .cart-item-image {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      margin-right: 16px;
    }

    .cart-item-details {
      flex: 1;
    }

    .cart-item-details h4 {
      margin: 0 0 8px 0;
      color: #333;
      font-size: 16px;
    }

    .cart-item-price {
      color: #ff6f61;
      font-weight: 600;
      margin: 0 0 8px 0;
    }

    .cart-item-quantity {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cart-item-quantity button {
      width: 28px;
      height: 28px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    .cart-item-quantity button:hover {
      background: #f5f5f5;
    }

    .cart-item-quantity span {
      min-width: 30px;
      text-align: center;
    }

    .cart-item-remove {
      background: none;
      border: none;
      color: #f44336;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
    }

    .cart-item-remove:hover {
      color: #d32f2f;
    }

    .cart-summary {
      display: block;
      max-width: 400px;
      margin-left: auto;
      margin-top: 30px;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 10px;
      background: #fff;
    }
  </style>
</head>
<body>

  <!-- Toast container -->
  <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
  <script src="assets/js/toast.js"></script>

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>
  <div id="footer-placeholder"></div>
  <script>
  function loadFooterWithChat() {
    fetch('components/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;

        // Ensure chat bootstrap script is loaded and initialized (works for injected footer)
        if (!document.getElementById('chatbot-script')) {
          const s = document.createElement('script');
          s.id = 'chatbot-script';
          s.src = 'assets/js/chatbot.js';
          s.onload = () => { if (typeof initChat === 'function') initChat(); };
          document.body.appendChild(s);
        } else if (typeof initChat === 'function') {
          initChat();
        }
      })
      .catch(err => console.error('Error loading footer:', err));
  }

  document.addEventListener('DOMContentLoaded', loadFooterWithChat);
</script>

<main class="cart-main">
  <h1>Shopping Cart</h1>
  
  <div id="empty-cart" class="empty-cart" style="display:none;text-align:center;padding:40px;">
    <p style="color:#888;font-size:18px;">Your cart is empty</p>
    <a href="shop.html" style="display:inline-block;margin-top:20px;padding:12px 24px;background:#ff6f61;color:#fff;border-radius:8px;text-decoration:none;">Start Shopping</a>
  </div>
  
  <div id="cart-items"></div>
  
  <div class="cart-summary" style="display:none;">
    <p>Subtotal: $<span id="cart-subtotal">0.00</span></p>
    <p>Tax: $<span id="cart-tax">0.00</span></p>
    <p>Total: $<span id="cart-total">0.00</span></p>
    <button class="checkout-btn" onclick="window.location='checkout.html'">Checkout</button>
  </div>
</main>

<div id="navbar-placeholder"></div>
<div id="footer-placeholder"></div>
<script>
  async function loadNavbarAndFooter() {
    if (document.getElementById('navbar-placeholder')) {
      try {
        const response = await fetch('components/navbar.html');
        const html = await response.text();
        document.getElementById('navbar-placeholder').innerHTML = html;
        
        const toggle = document.getElementById('navbar-toggle');
        const links = document.getElementById('navbar-links');
        if (toggle && links) {
          toggle.addEventListener('click', () => {
            links.classList.toggle('active');
            toggle.classList.toggle('active');
          });
        }
      } catch (e) {
        console.error('Error loading navbar:', e);
      }
    }
    
    if (document.getElementById('footer-placeholder')) {
      try {
        const response = await fetch('components/footer.html');
        const html = await response.text();
        document.getElementById('footer-placeholder').innerHTML = html;
        
        if (!document.getElementById('chatbot-script')) {
          const s = document.createElement('script');
          s.id = 'chatbot-script';
          s.src = 'assets/js/chatbot.js';
          s.onload = () => { if (typeof initChat === 'function') initChat(); };
          document.body.appendChild(s);
        }
      } catch (e) {
        console.error('Error loading footer:', e);
      }
    }
  }

  document.addEventListener('DOMContentLoaded', loadNavbarAndFooter);
</script>

<script src="assets/js/toast.js"></script>
<script src="assets/js/cart.js"></script>

</body>
</html>
